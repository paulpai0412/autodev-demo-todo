schema_version: "1.0"
kind: context_checkpoint
line_cap: 80

subject:
  issue_number: "done"
  branch: "main"
  role: "main_orchestrator"
  checkpoint_reason: "issue_20_complete_next_issue_selection"

context_budget:
  warning_at_percent: 45
  stop_and_rotate_at_percent: 50
  measured_percent_used: "unknown"
  must_rotate_now: false

resume_policy:
  checkpoint_only_cross_session_resume: true
  do_not_import_full_prior_transcript: true
  raw_evidence_policy: "index_only; raw logs/traces stay in artifact bundle"

runtime_controls:
  approval_override_mode: "bypass_approval"
  default_merge_approval_mode: "human_required"
  set_only_at_workflow_start: true
  mutable_after_start: false
  scope: "workflow_run_only"
  applies_to: "all_prs_created_by_this_run"
  affects_stage: "release_worker_only"
  override_source: "user_requested_autodev_start"
  human_approval_skipped: true

state:
  completed:
    - "issue_worker: docs/agents/issue-tracker.md updated, PR #21 created and merged (sha: 9866d84f)."
    - "pr_verifier: evidence packet written at docs/agents/evidence/issue-20-pr-21.yaml, all gates pass."
    - "release_worker: PR #21 merged (sha: 9866d84f22c5d0f7c82f82454c207b07eeaa1b3e), issue #20 closed, workspace on main."
  in_progress:
    - "none"
  next:
    - "main_orchestrator selects next ready-for-agent issue or runs prd_phase_completeness_audit."
  blockers:
    - "none"

refs:
  issue_packet: "docs/agents/issue-packets/issue-20.yaml"
  worker_result: "docs/agents/worker-results/issue-20.yaml"
  evidence_packet: "docs/agents/evidence/issue-20-pr-21.yaml"
  handoff: "docs/agents/handoffs/issue-20.yaml"
  artifact_bundle: "docs/agents/release-results/issue-20-pr-21.yaml"

compact_payload:
  active_target: {issue_number: "none", branch: "main", role: "main_orchestrator", agent: "build", next_flow: "issue_selection_or_recovery"}
  authoritative_refs: ["/home/timmypai/apps/autodev-demo-todo/docs/agents/issue-packets/", "/home/timmypai/apps/autodev/docs/agents/autonomous-development-workflow.yaml"]
  state_snapshot:
    completed: ["issue_worker: PR #21 created/merged for issue #20.", "pr_verifier: all gates pass.", "release_worker: PR #21 merged, issue #20 closed, workspace clean on main."]
    in_progress: ["none"]
    next: ["main_orchestrator selects next ready-for-agent issue or runs prd_phase_completeness_audit."]
    blockers: ["none"]
  resume_rules: ["Resume from checkpoint and compact payload, not full chat history.", "Keep raw evidence as refs only; do not inline logs or traces."]
  immediate_next_action: "Select next ready-for-agent issue or run prd_phase_completeness_audit."

post_merge_workspace_hygiene:
  primary_workspace_branch_before: "agent/issue-20-validate-worker-success-requires-pr-metadata"
  primary_workspace_branch_after: "main"
  dirty_state_detected: false
  wip_branch_created: "none"
  stash_created: "none"
  workspace_clean_after: true
  issue_worktree_removed: true
  cleanup_status: "pass"
  blocked_reason: "none"

metadata:
  updated_by: "Sisyphus main_orchestrator (issue-20 complete)"
  updated_at: "2026-05-13T11:57:00+08:00"
