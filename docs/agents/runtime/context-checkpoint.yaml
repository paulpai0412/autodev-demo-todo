schema_version: "1.0"
kind: context_checkpoint
line_cap: 80

subject:
  issue_number: "20"
  branch: "main"
  role: "main_orchestrator"
  checkpoint_reason: "release_worker_completion"

context_budget:
  warning_at_percent: 45
  stop_and_rotate_at_percent: 50
  measured_percent_used: "unknown"
  must_rotate_now: false

resume_policy:
  checkpoint_only_cross_session_resume: true
  do_not_import_full_prior_transcript: true
  raw_evidence_policy: "index_only; raw logs/traces stay in artifact bundle"

runtime_controls:
  approval_override_mode: "bypass_approval"
  default_merge_approval_mode: "human_required"
  set_only_at_workflow_start: true
  mutable_after_start: false
  scope: "workflow_run_only"
  applies_to: "all_prs_created_by_this_run"
  affects_stage: "release_worker_only"
  override_source: "user_requested_autodev_start"
  human_approval_skipped: true

state:
  completed:
    - "issue_worker: tests/e2e/todo.spec.ts expanded, PR #14 created and merged."
    - "pr_verifier: evidence packet written, all 5 ACs and 4 gates pass."
    - "release_worker: PR #14 merged (sha: 5850c578), issue #10 closed, workspace on main."
    - "issue_worker: issue #20 doc contract update merged via PR #21."
    - "pr_verifier: evidence packet written for PR #21 with status pass."
    - "release_worker: PR #21 merged (sha: 9866d84f), issue #20 closed, workspace on main."
  in_progress: []
  next:
    - "main_orchestrator: issue_selection_or_recovery — select next ready-for-agent issue."
  blockers:
    - "none"

refs:
  issue_packet: "docs/agents/issue-packets/issue-20.yaml"
  worker_result: "docs/agents/worker-results/issue-20.yaml"
  evidence_packet: "docs/agents/evidence/issue-20-pr-21.yaml"
  handoff: "docs/agents/handoffs/issue-20.yaml"
  artifact_bundle: "docs/agents/release-results/issue-20-pr-21.yaml"

compact_payload:
  active_target: {issue_number: "20", branch: "main", role: "main_orchestrator", agent: "build", next_flow: "issue_selection_or_recovery"}
  authoritative_refs: ["docs/agents/issue-packets/issue-20.yaml", "/home/timmypai/apps/autodev/docs/agents/autonomous-development-workflow.yaml"]
  state_snapshot:
    completed: ["issue_worker success", "pr_verifier pass", "release_worker success — PR #21 merged, issue #20 closed"]
    in_progress: []
    next: ["main_orchestrator issue_selection_or_recovery"]
    blockers: ["none"]
  resume_rules: ["Resume from checkpoint and compact payload, not full chat history.", "Keep raw evidence as refs only; do not inline logs or traces."]
  immediate_next_action: "main_orchestrator: select next ready-for-agent issue or run prd_phase_completeness_audit."

post_merge_workspace_hygiene:
  primary_workspace_branch_before: "agent/issue-20-validate-worker-success-requires-pr-metadata"
  primary_workspace_branch_after: "main"
  dirty_state_detected: true
  wip_branch_created: "none"
  stash_created: "none"
  workspace_clean_after: true
  issue_worktree_removed: true
  cleanup_status: "pass"
  blocked_reason: "none"

metadata:
  updated_by: "OpenCode release_worker"
  updated_at: "2026-05-13T11:56:41+08:00"
